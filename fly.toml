# Production app — real grader, real teachers.
app = "goblins-grader"
primary_region = "iad"

[build]

[env]
  DATA_DIR = "/data"
  STATIC_DIR = "/app/client/dist"
  GRADER_BACKEND = "real"

[http_service]
  internal_port = 3000
  force_https = true
  # Always-on: no cold starts polluting demo latency (PLAN.md).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  # High limits so spike tests measure the app, not fly-proxy queueing.
  [http_service.concurrency]
    type = "requests"
    soft_limit = 400
    hard_limit = 1000

[mounts]
  source = "goblins_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
